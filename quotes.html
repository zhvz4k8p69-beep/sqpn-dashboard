function show(idx, fade) {
  const q = QUOTES[idx % QUOTES.length];
  const qt = document.getElementById('qt');
  const qa = document.getElementById('qa');
  function set() {
    qt.textContent = q.text;
    qa.textContent = '— ' + q.attr;
    if (fade) { qt.style.opacity = '1'; qa.style.opacity = '1'; }
    document.getElementById('qn').textContent =
      (idx % QUOTES.length + 1) + ' / ' + QUOTES.length;
  }
  if (fade) {
    qt.style.opacity = '0'; qa.style.opacity = '0';
    setTimeout(set, 620);
  } else { set(); }
}

  const s = slot();
