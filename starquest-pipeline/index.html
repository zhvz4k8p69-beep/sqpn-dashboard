<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>StarQuest Pipeline</title>

<!-- PWA / iOS home-screen app metadata -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipeline">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32.png" sizes="32x32">

<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --ink:#e6e9ef; --muted:#8a93a6; --accent:#4ade80; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:1px solid var(--line); background:var(--panel);
    flex-shrink:0;
  }
  header h1 { font-size:16px; margin:0; letter-spacing:.3px; font-weight:600; }
  header h1 .gr { color:var(--accent); }
  #refresh {
    background:var(--bg); color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer;
  }
  #refresh:active { opacity:.6; }
  nav {
    display:flex; gap:6px; padding:8px 12px; background:var(--panel);
    border-bottom:1px solid var(--line); flex-shrink:0;
  }
  nav button {
    flex:1; background:var(--bg); color:var(--muted); border:1px solid var(--line);
    border-radius:9px; padding:10px 8px; font-size:14px; font-weight:600; cursor:pointer;
  }
  nav button.active { color:var(--bg); background:var(--accent); border-color:var(--accent); }
  .views { position:relative; flex:1; min-height:0; }
  .views iframe {
    position:absolute; inset:0; width:100%; height:100%; border:0;
    background:var(--bg); display:none;
  }
  .views iframe.active { display:block; }
  #installTip {
    display:none; align-items:center; gap:10px; padding:10px 16px;
    background:#172554; color:#93c5fd; font-size:13px; border-bottom:1px solid var(--line);
  }
  #installTip button {
    margin-left:auto; background:none; border:1px solid #93c5fd; color:#93c5fd;
    border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer;
  }
  #offlineBadge {
    display:none; font-size:11px; color:#fca5a5; text-transform:uppercase;
    letter-spacing:.5px; font-weight:700;
  }
</style>
</head>
<body>

<div id="installTip">
  <span>Add this to your Home Screen: tap <strong>Share</strong> → <strong>Add to Home Screen</strong>.</span>
  <button onclick="document.getElementById('installTip').style.display='none'">Dismiss</button>
</div>

<header>
  <h1>StarQuest <span class="gr">Pipeline</span></h1>
  <div style="display:flex; align-items:center; gap:10px;">
    <span id="offlineBadge">Offline — showing last update</span>
    <button id="refresh" onclick="reloadActive()">Refresh</button>
  </div>
</header>

<nav>
  <button class="active" data-target="greenroom" onclick="showView('greenroom')">Greenroom</button>
  <button data-target="pipeline" onclick="showView('pipeline')">Pipeline</button>
  <button data-target="standby" onclick="showView('standby')">Standby</button>
</nav>

<div class="views">
  <iframe id="frame-greenroom" class="active" src="../greenroom.html" title="The Greenroom — Show Pipeline"></iframe>
  <iframe id="frame-pipeline" src="../pipeline.html" title="The Pipeline — Sponsors"></iframe>
  <iframe id="frame-standby" src="../standby.html" title="Standby — Waiting For"></iframe>
</div>

<script>
  function showView(name) {
    document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.target === name));
    document.querySelectorAll('.views iframe').forEach(f => f.classList.toggle('active', f.id === 'frame-' + name));
  }

  function reloadActive() {
    var active = document.querySelector('.views iframe.active');
    if (active) {
      // Cache-bust so a network-first service worker always tries fresh HTML.
      var base = active.src.split('?')[0];
      active.src = base + '?t=' + Date.now();
    }
  }

  // Only show the "add to home screen" tip in Safari, when not already installed.
  (function () {
    var isStandalone = window.navigator.standalone === true ||
      window.matchMedia('(display-mode: standalone)').matches;
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS && !isStandalone) {
      document.getElementById('installTip').style.display = 'flex';
    }
  })();

  window.addEventListener('offline', function () { document.getElementById('offlineBadge').style.display = 'inline'; });
  window.addEventListener('online', function () { document.getElementById('offlineBadge').style.display = 'none'; });
  if (!navigator.onLine) document.getElementById('offlineBadge').style.display = 'inline';

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (err) {
        console.warn('SW registration failed', err);
      });
    });
  }
</script>

</body>
</html>
