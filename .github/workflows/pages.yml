name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Newer pushes supersede an in-flight deploy instead of racing it.
# This replaces the built-in "pages build and deployment" workflow,
# which had no concurrency control and no retry.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 30

      - name: Deploy (retry after transient failure)
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
